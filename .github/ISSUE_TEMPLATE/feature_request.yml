name: Feature request
description: Suggest a new check or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What silent failure would this catch?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed check or feature
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Suggested severity
      options: [FATAL, WARN, INFO]
